version: "3.9"

services:
  init_db:
    build: .
    container_name: init_db
    working_dir: /Web_Proyecto
    volumes:
      - ./Web_Proyecto:/Web_Proyecto
    depends_on:
      - db
    command: >
      bash -c "
      echo 'Esperando a PostgreSQL...' &&
      sleep 5 &&
      python -m bbdd.load_data.seed &&
      echo 'Seed completado'
      "

  redis:
    image: redis:7
    container_name: redis_broker
    ports:
      - "6379:6379"

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: webuser
      POSTGRES_PASSWORD: webpass
      POSTGRES_DB: webdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  worker:
    build: .
    container_name: celery_worker
    working_dir: /Web_Proyecto
    volumes:
      - ./Web_Proyecto:/Web_Proyecto
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    command: celery -A celery_app.celery_app worker --loglevel=info
    depends_on:
      - redis
      - db
      - init_db

  flower:
    build: .
    container_name: celery_flower
    working_dir: /Web_Proyecto
    volumes:
      - ./Web_Proyecto:/Web_Proyecto
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    command: celery -A celery_app.celery_app flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis

volumes:
  postgres_data:
